    <style>
        body {
            margin: 0;
            height: 80vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #loggedInMessage {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
        }


        .item {
            background-color: black; 
            border: 2px solid white; 
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .container {
            text-align: center;
        }

        #centeredContent {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80%;
        }

        canvas {
            border: 2px solid #fff;
        }

        #startButton, #startTournamentButton {
            display: inline-block; /* Display buttons inline */
            margin-right: 10px; /* Add some spacing between buttons */
        }

        .player-input {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #pongGame {
            display: none;
        }

        #playOptions {
            display: none;
        }

        #header {
            position: absolute;
            top: 0;
            left: 0;
            color: white;
            background-color: black;
            padding: 10px;
        }

        #leftPlayerName {
            position: absolute; 
            left: 30px; 
            top:65%;
        }

        #rightPlayerName {
            position: absolute; 
            right: 30px; 
            top: 65%;
        }

    </style>
</head>

    <script>
        function handleClickLogin(itemText) {
            alert("Clicked on " + itemText);
            
        }
        // Dummy implementation of logged in user
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // Prevent the form from being submitted to the server
            event.preventDefault();

            // Get the user's name from the input field
            var username = document.getElementById('username').value;

            // Set the content of loggedInMessage to the user's name
            document.getElementById('loggedInMessage').textContent = "Logged in as " + username;
            document.getElementById('loggedInMessage').style.display = "block";
            this.style.display = "none";
            document.getElementById("dashboards").style.display = "none";
            document.getElementById('playOptions').style.display = "block";
        });

        // Make the first player input read-only
        var player1Input = document.getElementById("localPlayer1Name");
        player1Input.readOnly = true;
    </script>
